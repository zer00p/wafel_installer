name: CI-Release

on:
  pull_request:
    types: [ opened, reopened ]
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: build binary
        run: |
          docker run --rm -v ${PWD}:/project builder:latest /bin/bash -c "make clean && make"
      - name: create distribution .zip
        run: |
          docker run --rm -v ${PWD}:/project builder make dist
      - uses: actions/upload-artifact@v4
        with:
          name: wafel_installer
          path: "./dist/wiiu/apps/wafel_installer"
  build-guide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Build guide HTML
        run: python3 build_guide.py
      - name: Create guide.zip
        run: cd Guide_html && zip -r ../guide.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: guide
          path: guide.zip
  deploy-binary:
    needs: [build-binary, build-guide]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Get environment variables
        id: get_repository_name
        run: |
          echo "REPOSITORY_NAME=$(echo "$GITHUB_REPOSITORY" | awk -F / '{print $2}' | sed -e "s/:refs//")" >> $GITHUB_ENV
          echo "DATETIME=$(date '+%Y%m%d-%H%M%S')" >> $GITHUB_ENV
      - uses: actions/download-artifact@v4
        with:
          name: wafel_installer
          path: wafel_installer
      - uses: actions/download-artifact@v4
        with:
          name: guide
          path: guide
      - name: Create Release
        uses: "softprops/action-gh-release@v2"
        with:
          tag_name: ${{ env.REPOSITORY_NAME }}-${{ env.DATETIME }}
          draft: true
          prerelease: true
          generate_release_notes: true
          name: Nightly-${{ env.REPOSITORY_NAME }}-${{ env.DATETIME }}
          files: |
            wafel_installer/wafel_installer.wuhb
            wafel_installer/wafel_installer.rpx
            guide/guide.zip